{% extends "jobs/base.html" %}

{% block content %}

<h2>My Applications</h2>

<table class="table">
    <tr>
        <th>Job</th>
        <th>Company</th>
        <th>Applied On</th>
    </tr>

    {% for app in applications %}
    <tr>
        <td>{{ app.job.title }}</td>
        <td>{{ app.job.company }}</td>
        <td>{{ app.applied_at }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">No applications yet</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
